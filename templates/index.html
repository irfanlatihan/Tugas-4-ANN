<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Prediksi ANN</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1d3557, #457b9d);
            min-height: 100vh;
            color: #333;
        }

        .card-custom {
            border-radius: 15px;
            padding: 25px;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: fadeIn 0.8s ease-in-out;
        }

        .title {
            color: white;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
        }

        .btn-custom {
            background: #1d3557;
            color: white;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #457b9d;
            transform: scale(1.05);
        }

        .result-box {
            background: #f1faee;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 18px;
        }

        img {
            border-radius: 10px;
            margin-top: 20px;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>

<div class="container py-5">

    <h2 class="title">📊 Prediksi {{ kolom_y }} dengan ANN</h2>

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card-custom">

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Masukkan {{ kolom_x }}</label>
                        <input type="number" name="tahun" class="form-control" placeholder="Contoh: 2030" required>
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-custom px-4">
                            🔍 Prediksi Sekarang
                        </button>
                    </div>
                </form>

                {% if hasil %}
                <div class="result-box text-center">
                    <strong>Hasil Prediksi:</strong><br>
                    {{ kolom_y }} pada {{ kolom_x }} 
                    <b>{{ request.form.tahun }}</b> adalah<br>
                    <span style="font-size:22px; color:#1d3557;">
                        {{ hasil }}
                    </span>
                </div>
                {% endif %}

                {% if grafik %}
                <div class="text-center">
                    <img src="data:image/png;base64,{{ grafik }}" class="img-fluid">
                </div>
                {% endif %}

            </div>

        </div>
    </div>

</div>

</body>
</html>
